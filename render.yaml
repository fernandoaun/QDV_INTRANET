# Blueprint de Render: debe estar en la RAÍZ del repositorio (Render solo lo detecta ahí).
# Aplicar: Dashboard → New → Blueprint → conectar este repo.
#
# Antes del primer deploy: en el servicio web, definí SECRET_KEY (valor largo aleatorio).
# DATABASE_URL se inyecta desde la base declarada abajo.
#
# https://render.com/docs/blueprint-spec

databases:
  - name: qdv-postgres
    databaseName: qdv_salmuera
    user: qdv
    # Plan Postgres válido en Blueprint (no usar solo "basic"). Ver: render.com/docs/blueprint-spec
    # Omitir "plan" también funciona: Render usa basic-256mb por defecto.
    plan: basic-256mb

services:
  - type: web
    name: qdv-salmuera-web
    runtime: python
    plan: starter
    region: oregon
    rootDir: project_web
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -m alembic upgrade head && python -m flask --app run seed-msgi-anexos
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT --forwarded-allow-ips='*' wsgi:app
    # PDFs (erlenmeyer) y adjuntos: fuera de esto se pierden al redesplegar (filesystem efímero).
    disk:
      name: qdv-uploads
      mountPath: /var/qdv/uploads
      sizeGB: 1
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: APP_UPLOAD_ROOT
        value: /var/qdv/uploads
      - key: DATABASE_URL
        fromDatabase:
          name: qdv-postgres
          property: connectionString
      # Definí este valor en el dashboard (Environment) la primera vez; no lo pongas en Git.
      - key: SECRET_KEY
        sync: false
      # Correo: NO usar value: "" aquí — Render puede pisar lo que cargás en Environment al sincronizar el Blueprint.
      # Definí SMTP_* y MAIL_FROM solo en el Dashboard (o Secret Files). sync: false = el YAML no las sobrescribe.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_TLS
        value: "true"

  # Avisos diarios por mail. Sin fromService (Render rechaza refs si marca variables como no definidas).
  # Igual secreto SMTP en web y Cron: cargá ENV en ambos servicios en el Dashboard.
  # Horario UTC: 13:00 · Ver DEPLOY_RENDER.md §7 y §9.
  # Si en el Dashboard el Cron quedó en modo Docker: Start Command debe ser flask send-deadline-reminders, no el CMD del Dockerfile.
  - type: cron
    name: qdv-salmuera-deadline-reminders
    runtime: python
    region: oregon
    plan: starter
    rootDir: project_web
    buildCommand: pip install -r requirements.txt
    startCommand: python -m flask --app run send-deadline-reminders
    schedule: "0 13 * * *"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        fromDatabase:
          name: qdv-postgres
          property: connectionString
      # Mismo valor que qdv-salmuera-web (copiar/pegar desde Environment del web).
      - key: SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_TLS
        value: "true"
