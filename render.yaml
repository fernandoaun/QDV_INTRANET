# Blueprint de Render: debe estar en la RAÍZ del repositorio (Render solo lo detecta ahí).
# Aplicar: Dashboard → New → Blueprint → conectar este repo.
#
# Antes del primer deploy: en el servicio web, definí SECRET_KEY (valor largo aleatorio).
# DATABASE_URL se inyecta desde la base declarada abajo.
#
# https://render.com/docs/blueprint-spec

databases:
  - name: qdv-postgres
    databaseName: qdv_salmuera
    user: qdv
    # Plan Postgres válido en Blueprint (no usar solo "basic"). Ver: render.com/docs/blueprint-spec
    # Omitir "plan" también funciona: Render usa basic-256mb por defecto.
    plan: basic-256mb

services:
  - type: web
    name: qdv-salmuera-web
    runtime: python
    plan: starter
    region: oregon
    rootDir: project_web
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -m alembic upgrade head
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT wsgi:app
    # PDFs (erlenmeyer) y adjuntos: fuera de esto se pierden al redesplegar (filesystem efímero).
    disk:
      name: qdv-uploads
      mountPath: /var/qdv/uploads
      sizeGB: 1
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: APP_UPLOAD_ROOT
        value: /var/qdv/uploads
      - key: DATABASE_URL
        fromDatabase:
          name: qdv-postgres
          property: connectionString
      # Definí este valor en el dashboard (Environment) la primera vez; no lo pongas en Git.
      - key: SECRET_KEY
        sync: false
      # Opcional hasta que configures avisos por mail. Si vacío, los avisos automáticos no podrán conectar al SMTP.
      # Las mismas variables son las que hereda el Cron `qdv-salmuera-deadline-reminders`.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_TLS
        value: "true"

  # Avisos diarios por mail (planificación + mantenimiento). Reutiliza SMTP y secreto del servicio web.
  # Horario UTC: 13:00 ≈ mañana en Argentina · Ver: DEPLOY_RENDER.md §7.
  - type: cron
    name: qdv-salmuera-deadline-reminders
    runtime: python
    region: oregon
    plan: starter
    rootDir: project_web
    buildCommand: pip install -r requirements.txt
    startCommand: python -m flask --app run send-deadline-reminders
    schedule: "0 13 * * *"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        fromDatabase:
          name: qdv-postgres
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: qdv-salmuera-web
          type: web
          envVarKey: SECRET_KEY
      # Mismas claves que configurás en el servicio web (Environment). Si no existen aún, crealas en el web con los valores de tu proveedor SMTP.
      - key: SMTP_HOST
        fromService:
          name: qdv-salmuera-web
          type: web
          envVarKey: SMTP_HOST
      - key: SMTP_USER
        fromService:
          name: qdv-salmuera-web
          type: web
          envVarKey: SMTP_USER
      - key: SMTP_PASSWORD
        fromService:
          name: qdv-salmuera-web
          type: web
          envVarKey: SMTP_PASSWORD
      - key: MAIL_FROM
        fromService:
          name: qdv-salmuera-web
          type: web
          envVarKey: MAIL_FROM
      - key: SMTP_PORT
        fromService:
          name: qdv-salmuera-web
          type: web
          envVarKey: SMTP_PORT
      - key: SMTP_USE_TLS
        fromService:
          name: qdv-salmuera-web
          type: web
          envVarKey: SMTP_USE_TLS
