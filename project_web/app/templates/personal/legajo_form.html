{% extends "base.html" %}
{% block title %}{% if empleado %}Editar{% else %}Nuevo{% endif %} legajo · Personal · QDV{% endblock %}
{% block content %}
<div class="app-page-head">
  <h1 class="app-page-title">{% if empleado %}Editar legajo {{ empleado.legajo }}{% else %}Nuevo legajo{% endif %}</h1>
  <div class="app-page-actions">
    <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('personal.legajos') }}">Volver</a>
  </div>
</div>

<form method="post" class="app-card">
  <div class="app-card-body">
    <div class="row g-3">
      <div class="col-md-2">
        <label class="form-label">Legajo *</label>
        <input type="text" class="form-control" name="legajo" value="{{ empleado.legajo if empleado else '' }}" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">DNI</label>
        <input type="text" class="form-control" name="dni" value="{{ empleado.dni if empleado else '' }}">
      </div>
      <div class="col-md-2">
        <label class="form-label">CUIL</label>
        <input type="text" class="form-control" name="cuil" value="{{ empleado.cuil if empleado else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Apellido *</label>
        <input type="text" class="form-control" name="apellido" value="{{ empleado.apellido if empleado else '' }}" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Nombre *</label>
        <input type="text" class="form-control" name="nombre" value="{{ empleado.nombre if empleado else '' }}" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Fecha nacimiento</label>
        <input type="date" class="form-control" name="fecha_nacimiento" value="{{ empleado.fecha_nacimiento.isoformat() if empleado and empleado.fecha_nacimiento else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Fecha ingreso</label>
        <input type="date" class="form-control" name="fecha_ingreso" value="{{ empleado.fecha_ingreso.isoformat() if empleado and empleado.fecha_ingreso else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Puesto</label>
        <input type="text" class="form-control" name="puesto" value="{{ empleado.puesto if empleado else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Área</label>
        <input type="text" class="form-control" name="area" value="{{ empleado.area if empleado else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Estado</label>
        <select class="form-select" name="estado">
          {% for k, lbl in estado_labels.items() %}
          <option value="{{ k }}" {% if empleado and empleado.estado == k %}selected{% elif not empleado and k == 'activo' %}selected{% endif %}>{{ lbl }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Domicilio</label>
        <input type="text" class="form-control" name="domicilio" value="{{ empleado.domicilio if empleado else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Teléfono</label>
        <input type="text" class="form-control" name="telefono" value="{{ empleado.telefono if empleado else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="email" value="{{ empleado.email if empleado else '' }}">
      </div>
      <div class="col-md-2">
        <label class="form-label">Talle pantalón</label>
        <input type="text" class="form-control" name="talle_pantalon" value="{{ empleado.talle_pantalon if empleado else '' }}">
      </div>
      <div class="col-md-2">
        <label class="form-label">Talle camisa</label>
        <input type="text" class="form-control" name="talle_camisa" value="{{ empleado.talle_camisa if empleado else '' }}">
      </div>
      <div class="col-md-2">
        <label class="form-label">Talle calzado</label>
        <input type="text" class="form-control" name="talle_calzado" value="{{ empleado.talle_calzado if empleado else '' }}">
      </div>
      <div class="col-md-2">
        <label class="form-label">Talle guantes</label>
        <input type="text" class="form-control" name="talle_guantes" value="{{ empleado.talle_guantes if empleado else '' }}">
      </div>
      <div class="col-md-2">
        <label class="form-label">Talle casco</label>
        <input type="text" class="form-control" name="talle_casco" value="{{ empleado.talle_casco if empleado else '' }}">
      </div>
      <div class="col-md-4">
        <label class="form-label">Operador vinculado (producción)</label>
        <select class="form-select" name="operador_id">
          <option value="">— Ninguno —</option>
          {% for o in operadores %}
          <option value="{{ o.id }}" {% if empleado and empleado.operador_id == o.id %}selected{% endif %}>{{ o.nombre }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">Observaciones</label>
        <textarea class="form-control" name="observaciones" rows="3">{{ empleado.observaciones if empleado else '' }}</textarea>
      </div>
    </div>
    <div class="mt-3">
      <button type="submit" class="btn btn-primary">Guardar</button>
    </div>
  </div>
</form>
{% endblock %}
