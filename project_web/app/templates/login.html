{% extends "base.html" %}
{% block title %}Iniciar sesión · QDV{% endblock %}
{% block content %}
<div class="app-login-page">
  <div class="app-login-card">
    <h1 class="h5 mb-3">Iniciar sesión</h1>
    {% if error %}
    <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('auth.login') }}">
    {% include "_csrf.html" %}
      {% if next %}
      <input type="hidden" name="next" value="{{ next }}">
      {% endif %}
      <div class="mb-3">
        <label class="form-label" for="username">Usuario</label>
        <input class="form-control" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>
    <p class="mt-3 mb-0 small app-text-secondary">
      <a href="{{ url_for('main.index') }}">Volver al inicio</a>
      · <a href="{{ url_for('main.instalar') }}">Instalar en el celular</a>
    </p>
  </div>
</div>
{% endblock %}
