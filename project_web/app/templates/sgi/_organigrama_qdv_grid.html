{% macro render_node(n) %}
<div class="sgi-org-grid-cell sgi-org-grid-cell--{{ n.kind|default('internal') }}"
     style="grid-row: {{ n.row }}; grid-column: {{ n.col }};"
     data-node-id="{{ n.id }}"
     data-row="{{ n.row }}"
     data-col="{{ n.col }}">
  <button type="button"
          class="sgi-org-node{% if n.id == 'gerencia_general' %} sgi-org-node--root{% endif %} sgi-org-node--{{ n.kind|default('internal') }}"
          data-node-id="{{ n.id }}"
          data-parent-id="{{ n.parent_id or '' }}"
          {% if n.usuario %}
          data-nombre="{{ n.usuario.nombre|e }}"
          data-username="{{ n.usuario.username|e }}"
          data-rol="{{ n.usuario.rol|e }}"
          data-puesto="{{ n.usuario.puesto|e }}"
          data-area="{{ n.usuario.area|e }}"
          data-email="{{ n.usuario.email|e }}"
          data-telefono="{{ n.usuario.telefono|e }}"
          {% endif %}>
    <span class="sgi-org-node-title">{{ n.titulo }}</span>
  </button>
</div>
{% endmacro %}

{% if layout_items %}
<div class="sgi-org-qdv-grid" role="tree" aria-label="Organigrama QDV">
  {% for n in layout_items %}{{ render_node(n) }}{% endfor %}
</div>
<div class="sgi-org-qdv-footer">
  <div class="sgi-org-legend">
    <span class="sgi-org-legend-swatch sgi-org-legend-swatch--external" aria-hidden="true"></span>
    <span>Servicios Externos</span>
  </div>
</div>
{% else %}
<div class="sgi-org-empty alert alert-warning mb-0">
  No hay puestos cargados. {% if puede_editar|default(false) %}Usá <strong>Editar organigrama</strong> para definir la estructura.{% endif %}
</div>
{% endif %}
